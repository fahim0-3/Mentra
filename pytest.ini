[pytest]
# Default to the project's test package.
testpaths = mentra/tests

# The files below are manual diagnostic SCRIPTS, not unit tests: they load a
# Whisper model or open an audio device at import time, which can crash the
# pytest collector with a native access violation. Run them by hand when
# needed; exclude them from the automated suite so `pytest` is reliable.
addopts =
    --ignore=mentra/tests/test_dll_fix.py
    --ignore=mentra/tests/test_no_pyqt5.py
    --ignore=mentra/tests/test_import.py
    --ignore=mentra/tests/test_torch_mock.py
    --ignore=mentra/tests/test_loopback.py
